<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Douyin Real Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">
    <div class="max-w-4xl w-full space-y-8">
        <header class="text-center">
            <h1 class="text-5xl font-extrabold gradient-text mb-2">Douyin Real Video</h1>
            <p class="text-slate-400">Tải video Douyin chất lượng cao, không logo (No Watermark)</p>
        </header>

        <div class="glass p-6 rounded-2xl space-y-4">
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="text" id="urlInput" placeholder="Dán link Douyin vào đây..." 
                       class="flex-1 bg-slate-800 border-slate-700 text-white p-4 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <button onclick="getVideoInfo()" id="btnInfo"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl transition-all disabled:opacity-50">
                    Phân tích
                </button>
            </div>
            <p id="statusMsg" class="text-sm text-slate-400 italic hidden"></p>
        </div>

        <div id="videoResult" class="hidden glass p-6 rounded-2xl animate-fade-in flex flex-col md:flex-row gap-6">
            <div class="md:w-1/3">
                <img id="thumbnail" src="" alt="Thumbnail" class="w-full rounded-xl shadow-lg">
            </div>
            <div class="md:w-2/3 space-y-4">
                <h2 id="videoTitle" class="text-2xl font-bold"></h2>
                <p id="videoAuthor" class="text-indigo-400 font-semibold"></p>
                <div class="flex gap-4">
                    <span id="videoDuration" class="bg-slate-700 px-3 py-1 rounded-full text-sm"></span>
                    <span id="videoLikes" class="bg-slate-700 px-3 py-1 rounded-full text-sm"></span>
                </div>
                <div class="pt-4 border-t border-slate-700 flex flex-wrap gap-4">
                    <button onclick="downloadVideo()" id="btnDownload"
                            class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-xl transition-all">
                        Tải Video Không Logo
                    </button>
                    <a id="previewBtn" href="" target="_blank"
                       class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-xl transition-all">
                        Xem Link Gốc
                    </a>
                </div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl">
            <h3 class="text-xl font-bold mb-4">Lịch sử gần đây</h3>
            <div id="history" class="space-y-2 text-slate-400 text-sm">
                (Chưa có dữ liệu lịch sử)
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8001/api/v1/douyin";
        let currentVideo = null;

        async function getVideoInfo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return alert("Vui lòng dán link!");

            const btn = document.getElementById('btnInfo');
            const status = document.getElementById('statusMsg');
            btn.disabled = true;
            status.innerText = "🔍 Đang phân tích video...";
            status.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE}/info`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const data = await response.json();
                
                if (data.id) {
                    currentVideo = data;
                    showResult(data);
                    status.innerText = "✅ Phân tích thành công!";
                } else {
                    status.innerText = "❌ Không tìm thấy thông tin video.";
                }
            } catch (error) {
                console.error(error);
                status.innerText = "❌ Lỗi kết nối API.";
            } finally {
                btn.disabled = false;
            }
        }

        function showResult(v) {
            document.getElementById('videoResult').classList.remove('hidden');
            document.getElementById('videoTitle').innerText = v.title;
            document.getElementById('videoAuthor').innerText = "@" + v.author;
            document.getElementById('thumbnail').src = v.thumbnail;
            document.getElementById('videoDuration').innerText = "Dài: " + v.duration + "s";
            document.getElementById('videoLikes').innerText = "❤️ " + v.like_count;
            document.getElementById('previewBtn').href = v.video_url;
        }

        async function downloadVideo() {
            if (!currentVideo) return;
            const btn = document.getElementById('btnDownload');
            btn.innerText = "⏳ Đang tải...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        url: currentVideo.original_url,
                        video_id: currentVideo.id,
                        filename: `douyin_${currentVideo.id}`
                    })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    alert("✅ Đã tải xong! Video nằm trong thư mục outputs/douyin");
                } else {
                    alert("❌ Tải thất bại.");
                }
            } catch (error) {
                alert("❌ Lỗi tải video.");
            } finally {
                btn.innerText = "Tải Video Không Logo";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
