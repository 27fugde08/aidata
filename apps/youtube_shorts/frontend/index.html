<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI YouTube Shorts Automation Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: #fafafa; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid #27272a; }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
        .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">AI Shorts <span class="text-indigo-500">Automation</span> <span class="text-xs font-mono text-indigo-500/50">v2.0</span></h1>
                <p class="text-zinc-400 mt-2">Nền tảng tự động hóa nội dung chuyên nghiệp.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="fetchShorts()" class="p-2 rounded-full glass hover:bg-zinc-800 transition">
                    <i data-lucide="rotate-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="flex gap-8 mb-8 border-b border-zinc-800">
            <button onclick="switchTab('studio')" id="tab-studio" class="pb-4 px-2 font-bold text-indigo-500 border-b-2 border-indigo-500 transition">AI STUDIO</button>
            <button onclick="switchTab('projects')" id="tab-projects" class="pb-4 px-2 font-bold text-zinc-500 hover:text-zinc-300 transition">DỰ ÁN ĐÃ LƯU</button>
        </div>

        <div id="view-studio">
            <!-- Input Section -->
            <section class="glass rounded-2xl p-6 mb-12">
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="url-input" placeholder="Dán link Video hoặc link Kênh vào đây..." 
                           class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 outline-none focus:ring-2 ring-indigo-500 transition">
                    <div class="flex gap-2">
                        <button onclick="scanChannel()" class="bg-zinc-800 px-6 py-3 rounded-xl font-bold hover:bg-zinc-700 transition border border-zinc-700">QUÉT KÊNH</button>
                        <button onclick="processDirectly()" class="accent-gradient px-6 py-3 rounded-xl font-bold hover:opacity-90 transition shadow-lg shadow-indigo-500/20">XỬ LÝ VIDEO TRỰC TIẾP</button>
                    </div>
                </div>
                <div id="scan-status" class="mt-4 text-sm text-zinc-500"></div>
            </section>

            <!-- Main Content Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="list-video"></i> Video Nguồn</h3>
                    <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
                <div>
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="sparkles" class="text-yellow-500"></i> Viral Shorts</h3>
                    <div id="shorts-list" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div id="view-projects" class="hidden">
            <h3 class="text-xl font-bold mb-6">Thư viện dự án</h3>
            <div id="project-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
        <div class="glass max-w-sm w-full rounded-3xl p-4 border-indigo-500/50 border-2 relative">
            <button onclick="closePreviewModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-white">&times;</button>
            <h3 class="font-bold text-center mb-4" id="preview-title"></h3>
            <video id="preview-video" class="w-full rounded-xl" controls autoplay muted loop></video>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8888/api/video";
        
        // Khôi phục danh sách video đang xử lý từ localStorage
        let processingIds = JSON.parse(localStorage.getItem('processingIds') || "[]");

        function saveProcessingIds() {
            localStorage.setItem('processingIds', JSON.stringify(processingIds));
        }

        function addToProcessing(id) {
            if (!processingIds.includes(id)) {
                processingIds.push(id);
                saveProcessingIds();
            }
        }

        function removeFromProcessing(id) {
            processingIds = processingIds.filter(pid => pid !== id);
            saveProcessingIds();
        }

        function switchTab(tab) {
            const studio = document.getElementById('view-studio');
            const projects = document.getElementById('view-projects');
            const tabStudio = document.getElementById('tab-studio');
            const tabProjects = document.getElementById('tab-projects');

            if (tab === 'studio') {
                studio.classList.remove('hidden');
                projects.classList.add('hidden');
                tabStudio.classList.add('text-indigo-500', 'border-indigo-500');
                tabProjects.classList.remove('text-indigo-500', 'border-indigo-500');
                tabProjects.classList.add('text-zinc-500');
            } else {
                studio.classList.add('hidden');
                projects.classList.remove('hidden');
                tabProjects.classList.add('text-indigo-500', 'border-indigo-500');
                tabStudio.classList.remove('text-indigo-500', 'border-indigo-500');
                tabStudio.classList.add('text-zinc-500');
                loadProjectHistory();
            }
        }

        async function loadProjectHistory() {
            const res = await fetch(`${API_URL}/api/video/projects`);
            const data = await res.json();
            const list = document.getElementById('project-list');
            
            if (data.projects.length === 0) {
                list.innerHTML = `<div class="col-span-3 text-center text-zinc-500 py-20">Chưa có dự án nào trong lịch sử.</div>`;
                return;
            }

            list.innerHTML = data.projects.map(p => `
                <div class="glass p-5 rounded-2xl border hover:border-indigo-500/50 transition cursor-pointer group" onclick="showProjectDetails('${p.id}')">
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-indigo-500/10 p-3 rounded-xl text-indigo-400">
                            <i data-lucide="folder"></i>
                        </div>
                        <span class="text-[10px] font-bold px-2 py-1 rounded bg-zinc-800 text-zinc-400 uppercase">${p.status}</span>
                    </div>
                    <h4 class="font-bold text-sm mb-1 truncate">${p.title}</h4>
                    <p class="text-[10px] text-zinc-500 mb-4">${new Date(p.created_at).toLocaleString('vi-VN')}</p>
                    <div class="flex items-center gap-2 text-indigo-400 font-bold text-[10px] opacity-0 group-hover:opacity-100 transition">
                        XEM CHI TIẾT <i data-lucide="chevron-right" class="w-3 h-3"></i>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function showProjectDetails(id) {
            const res = await fetch(`${API_URL}/api/video/project/${id}`);
            const data = await res.json();
            
            // Chuyển về studio và nạp danh sách shorts của project này
            switchTab('studio');
            const list = document.getElementById('shorts-list');
            
            list.innerHTML = `
                <div class="mb-4 p-3 bg-indigo-500/10 rounded-xl border border-indigo-500/20">
                    <div class="text-[10px] font-bold text-indigo-400 mb-1 uppercase tracking-tighter">Đang xem dự án</div>
                    <div class="text-xs font-bold truncate">${data.project.title}</div>
                </div>
            ` + data.shorts.map(s => {
                const scoreColor = s.score > 80 ? 'text-red-500' : (s.score > 50 ? 'text-yellow-500' : 'text-green-500');
                const layoutIcon = s.layout_type === 'split_screen' ? 'layout-grid' : 'square';
                return `
                <div class="glass p-3 rounded-xl flex items-center gap-4 hover:border-indigo-500/50 transition cursor-pointer" onclick="showPreviewModal('${s.video_url}', '${s.name}')">
                    <div class="w-12 h-16 bg-indigo-900/30 rounded-lg flex items-center justify-center relative">
                        <i data-lucide="video" class="w-5 h-5 text-indigo-400"></i>
                        <div class="absolute -top-2 -right-2 bg-zinc-900 border border-zinc-800 rounded-full w-7 h-7 flex items-center justify-center text-[10px] font-bold ${scoreColor}">
                            ${s.score}
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[8px] bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded border border-zinc-700 uppercase font-bold">${s.category || 'CHUNG'}</span>
                            <i data-lucide="${layoutIcon}" class="w-2.5 h-2.5 text-zinc-500"></i>
                        </div>
                        <div class="text-xs font-bold truncate text-zinc-200">${s.title}</div>
                        <div class="text-[9px] text-zinc-500 italic truncate" title="${s.explanation}">${s.explanation || "AI selected highlight"}</div>
                    </div>
                    <a href="${API_URL}${s.video_url}" download class="p-2 glass rounded-lg text-zinc-400 hover:text-white transition" onclick="event.stopPropagation()">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </a>
                </div>
            `;}).join('');
            lucide.createIcons();
        }

        function closePreviewModal() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-video').pause();
        }

        async function processVideo(url, id) {
            const btn = document.getElementById(`btn-${id}`);
            if (btn) {
                btn.disabled = true;
                btn.innerText = "ĐANG KHỞI TẠO...";
            }
            
            addToProcessing(id);
            showLoader(id);
            
            await fetch(`${API_URL}/api/video/process`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url, id })
            });

            trackProgress(id);
        }

        function showLoader(id) {
            const loader = document.getElementById(`loader-${id}`);
            if (loader) loader.classList.remove('hidden');
        }

        async function trackProgress(id) {
            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`${API_URL}/api/video/last-result/${id}`);
                    const data = await res.json();
                    
                    const loader = document.getElementById(`loader-${id}`);
                    const btn = document.getElementById(`btn-${id}`);

                    if (data.status === "processing") {
                        showLoader(id);
                        if (loader) {
                            loader.innerHTML = `
                                <div class="text-center px-4 w-full">
                                    <div class="text-xs font-bold text-indigo-400 mb-2 uppercase tracking-widest">${data.step || "Đang xử lý"}</div>
                                    <div class="w-full bg-zinc-800 rounded-full h-1.5 mb-2">
                                        <div class="bg-indigo-500 h-1.5 rounded-full transition-all duration-500" style="width: ${data.progress}%"></div>
                                    </div>
                                    <div class="text-[10px] text-zinc-500">${data.progress}%</div>
                                </div>
                            `;
                        }
                    } else if (data.status === "completed") {
                        clearInterval(poll);
                        removeFromProcessing(id);
                        if (loader) loader.classList.add('hidden');
                        if (btn) {
                            btn.disabled = false;
                            btn.innerText = "TẠO LẠI SHORTS";
                            btn.classList.add('bg-green-600');
                        }
                        fetchShorts();
                    } else if (data.status === "error") {
                        clearInterval(poll);
                        removeFromProcessing(id);
                        if (loader) loader.innerHTML = `<div class="text-red-500 text-xs p-4 text-center">LỖI: ${data.message}</div>`;
                        if (btn) {
                            btn.disabled = false;
                            btn.innerText = "THỬ LẠI";
                        }
                    }
                } catch (e) {
                    console.error("Polling error", e);
                }
            }, 2000);
        }

        // Tự động khôi phục các tiến trình khi load trang
        function restoreProcessing() {
            processingIds.forEach(id => {
                // Nếu card video đã có trên màn hình (từ scanChannel), track nó
                // Nếu là video trực tiếp, ta cần tạo lại card placeholder
                const card = document.getElementById(`card-${id}`);
                if (!card && !document.getElementById(`btn-${id}`)) {
                    // Tạo card placeholder cho video trực tiếp
                    createPlaceholderCard(id);
                }
                trackProgress(id);
            });
        }

        function createPlaceholderCard(id) {
            const grid = document.getElementById('video-grid');
            const placeholderCard = `
                <div class="glass rounded-xl overflow-hidden border-indigo-500 transition group relative" id="card-${id}">
                    <div class="w-full h-40 bg-zinc-800 flex items-center justify-center">
                         <i data-lucide="video" class="w-12 h-12 text-zinc-700"></i>
                    </div>
                    <div id="loader-${id}" class="absolute inset-0 bg-black/60 flex items-center justify-center">
                         <div class="animate-pulse-fast text-indigo-400 font-bold">ĐANG KHÔI PHỤC...</div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-sm truncate mb-3">Video đang xử lý: ${id}</h4>
                        <button id="btn-${id}" disabled
                                class="w-full py-2 bg-indigo-600 rounded-lg text-xs font-bold opacity-50">
                            ĐANG XỬ LÝ...
                        </button>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('afterbegin', placeholderCard);
            lucide.createIcons();
        }
        
        async function fetchShorts() {
            const res = await fetch(`${API_URL}/api/shorts/list`);
            const data = await res.json();
            const list = document.getElementById('shorts-list');
            if (data.shorts.length === 0) {
                list.innerHTML = `<div class="text-center text-sm text-zinc-500 py-10">Chưa có clip nào được tạo.</div>`;
                return;
            }
            list.innerHTML = data.shorts.map(s => {
                const scoreColor = s.score > 80 ? 'text-red-500' : (s.score > 50 ? 'text-yellow-500' : 'text-green-500');
                return `
                <div class="glass p-3 rounded-xl flex items-center gap-4 hover:border-indigo-500/50 transition cursor-pointer" onclick="showPreviewModal('${s.url}', '${s.name}')">
                    <div class="w-12 h-16 bg-indigo-900/30 rounded-lg flex items-center justify-center relative">
                        <i data-lucide="video" class="w-5 h-5 text-indigo-400"></i>
                        <div class="absolute -top-2 -right-2 bg-zinc-900 border border-zinc-800 rounded-full w-7 h-7 flex items-center justify-center text-[10px] font-bold ${scoreColor}">
                            ${s.score}
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[8px] bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded border border-zinc-700 uppercase font-bold">${s.category || 'CHUNG'}</span>
                        </div>
                        <div class="text-xs font-bold truncate text-zinc-200">${s.name}</div>
                        <div class="text-[9px] text-zinc-500 italic truncate" title="${s.explanation || s.reason}">${s.explanation || s.reason || "AI selected highlight"}</div>
                        <span class="text-[10px] text-indigo-400 font-semibold">CLICK ĐỂ XEM TRƯỚC</span>
                    </div>
                    <a href="${API_URL}${s.url}" download class="p-2 glass rounded-lg text-zinc-400 hover:text-white transition" onclick="event.stopPropagation()">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </a>
                </div>
            `;}).join('');
            lucide.createIcons();
        }
        // Simplified, other functions remain the same as previous version
        async function scanChannel() {
            const url = document.getElementById('url-input').value;
            const status = document.getElementById('scan-status');
            if (!url) return alert("Vui lòng nhập URL!");
            
            status.innerText = "Đang quét metadata từ YouTube...";
            
            try {
                const res = await fetch(`${API_URL}/api/channel/scan`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                renderVideos(data.videos);
                status.innerText = `Tìm thấy ${data.videos.length} video mới nhất.`;
            } catch (e) { status.innerText = "Lỗi kết nối API."; }
        }

        function extractVideoId(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            if (match && match[7].length == 11) return match[7];
            
            // Handle shorts
            if (url.includes("/shorts/")) {
                const parts = url.split("/");
                return parts[parts.indexOf("shorts") + 1].split("?")[0];
            }
            return null;
        }

        async function processDirectly() {
            const url = document.getElementById('url-input').value;
            if (!url) return alert("Vui lòng nhập URL Video!");
            
            const id = extractVideoId(url);
            if (!id) return alert("URL không hợp lệ. Vui lòng nhập link YouTube Video hoặc Shorts!");

            // Tạo một card giả lập trong grid để hiển thị tiến trình
            const grid = document.getElementById('video-grid');
            const placeholderCard = `
                <div class="glass rounded-xl overflow-hidden border-indigo-500 transition group relative" id="card-${id}">
                    <div class="w-full h-40 bg-zinc-800 flex items-center justify-center">
                         <i data-lucide="video" class="w-12 h-12 text-zinc-700"></i>
                    </div>
                    <div id="loader-${id}" class="absolute inset-0 bg-black/60 flex items-center justify-center">
                         <div class="animate-pulse-fast text-indigo-400 font-bold">ĐANG KHỞI TẠO...</div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-sm truncate mb-3">Video trực tiếp: ${id}</h4>
                        <button id="btn-${id}" disabled
                                class="w-full py-2 bg-indigo-600 rounded-lg text-xs font-bold opacity-50">
                            ĐANG XỬ LÝ...
                        </button>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('afterbegin', placeholderCard);
            lucide.createIcons();

            // Bắt đầu xử lý
            await fetch(`${API_URL}/api/video/process`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url, id })
            });

            trackProgress(id);
        }

        function renderVideos(videos) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = videos.map(v => `
                <div class="glass rounded-xl overflow-hidden hover:border-indigo-500 transition group relative">
                    <img src="${v.thumbnail}" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition">
                    <div id="loader-${v.id}" class="absolute inset-0 bg-black/60 flex items-center justify-center hidden">
                         <div class="animate-pulse-fast text-indigo-400 font-bold">AI ĐANG XỬ LÝ...</div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-sm truncate mb-3">${v.title}</h4>
                        <button id="btn-${v.id}" onclick="processVideo('${v.url}', '${v.id}')" 
                                class="w-full py-2 bg-indigo-600 rounded-lg text-xs font-bold hover:bg-indigo-500 transition">
                            TẠO SHORTS BẰNG AI
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Init
        lucide.createIcons();
        fetchShorts();
        restoreProcessing(); // Thêm dòng này
        setInterval(fetchShorts, 10000); 
    </script>
</body>
</html>
