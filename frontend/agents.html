<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOS | Agent Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 40px; background: #050507; }
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
    </style>
</head>
<body class="dark-theme">
    <header class="tower-header" style="margin-bottom: 30px; border-radius: 12px; background: var(--bg-panel);">
        <div class="header-breadcrumb">CORE AGENT MONITOR</div>
        <div class="status-badge live"><span class="pulse-dot"></span> 4 AGENTS STANDING BY</div>
    </header>

    <div class="agents-grid">
        <!-- Architect -->
        <div class="agent-card" id="agent-architect">
            <div class="agent-header">
                <div class="agent-icon"><i data-lucide="layout"></i></div>
                <div class="agent-info">
                    <div class="agent-name">Architect</div>
                    <div class="agent-status" id="status-architect">IDLE</div>
                </div>
            </div>
            <div class="agent-gauge"><div class="gauge-fill" id="progress-architect" style="width: 0%"></div></div>
            <div class="agent-terminal" id="log-architect"></div>
        </div>

        <!-- Developer -->
        <div class="agent-card" id="agent-developer">
            <div class="agent-header">
                <div class="agent-icon"><i data-lucide="code-2"></i></div>
                <div class="agent-info">
                    <div class="agent-name">Developer</div>
                    <div class="agent-status" id="status-developer">IDLE</div>
                </div>
            </div>
            <div class="agent-gauge"><div class="gauge-fill" id="progress-developer" style="width: 0%"></div></div>
            <div class="agent-terminal" id="log-developer"></div>
        </div>

        <!-- Tester -->
        <div class="agent-card" id="agent-tester">
            <div class="agent-header">
                <div class="agent-icon"><i data-lucide="check-square"></i></div>
                <div class="agent-info">
                    <div class="agent-name">Tester</div>
                    <div class="agent-status" id="status-tester">IDLE</div>
                </div>
            </div>
            <div class="agent-gauge"><div class="gauge-fill" id="progress-tester" style="width: 0%"></div></div>
            <div class="agent-terminal" id="log-tester"></div>
        </div>

        <!-- Reviewer -->
        <div class="agent-card" id="agent-reviewer">
            <div class="agent-header">
                <div class="agent-icon"><i data-lucide="search"></i></div>
                <div class="agent-info">
                    <div class="agent-name">Reviewer</div>
                    <div class="agent-status" id="status-reviewer">IDLE</div>
                </div>
            </div>
            <div class="agent-gauge"><div class="gauge-fill" id="progress-reviewer" style="width: 0%"></div></div>
            <div class="agent-terminal" id="log-reviewer"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Khởi tạo vòng lặp cập nhật cho 4 agents
            setInterval(updateAgentFleetStatus, 2000);
        });
    </script>
</body>
</html>
