<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOS | Douyin Ultimate v3.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; background: #050507; }
        .dashboard-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; }
        .stat-value { font-size: 22px; font-weight: 700; color: #fff; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 400px; gap: 20px; height: calc(100vh - 240px); }
        .content-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 15px 20px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .manual-input-bar { padding: 15px 20px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
        .url-input { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 8px 15px; color: var(--accent); font-family: 'Fira Code'; font-size: 12px; outline: none; }

        .artifact-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .artifact-table th { text-align: left; padding: 12px 20px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        .artifact-table td { padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-icon {
            width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: var(--text-dim);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
        .btn-icon.play:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); }
        .btn-icon.delete:hover { border-color: var(--danger); color: var(--danger); background: rgba(255, 71, 87, 0.1); }
        
        /* VIDEO PREVIEW MODAL */
        .video-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-container {
            width: 400px; background: #141417; border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-close {
            position: absolute; top: 15px; right: 15px; z-index: 10;
            color: #fff; cursor: pointer; background: rgba(0,0,0,0.5);
            border-radius: 50%; padding: 5px;
        }
        video { width: 100%; display: block; background: #000; }
        
        .terminal-box { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 15px; font-family: 'Fira Code'; font-size: 11px; display: flex; flex-direction: column; }
        #terminal-logs { flex: 1; overflow-y: auto; color: #4ec9b0; }
        .btn-glow { background: var(--accent); color: #000; font-weight: 800; border: none; padding: 12px; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px var(--accent-glow); display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body class="dark-theme">
    <header class="tower-header" style="margin-bottom: 20px; border-radius: 12px;">
        <div class="header-breadcrumb">DOUYIN ULTIMATE v3.8 <span class="status-tag running" style="margin-left:15px;">PREVIEW ENABLED</span></div>
        <div class="header-status" id="engine-status">IDLE</div>
    </header>

    <div class="dashboard-row">
        <div class="stat-card"><div class="stat-label">TOTAL HUNTED</div><div class="stat-value" id="val-hunted">0</div></div>
        <div class="stat-card"><div class="stat-label">SPACE SAVED</div><div class="stat-value" id="val-space" style="color:var(--accent);">0.0 MB</div></div>
        <div class="stat-card"><div class="stat-label">AI SCORE</div><div class="stat-value" style="color:var(--warning);">94.2%</div></div>
        <div class="stat-card"><div class="stat-label">ACTIVE PROJECTS</div><div class="stat-value" id="val-repo">0</div></div>
    </div>

    <div class="main-layout">
        <div class="content-panel">
            <div class="panel-header">
                <span style="font-weight:800; font-size:11px; letter-spacing:1px;">ARTIFACT REPOSITORY</span>
                <button class="btn btn-secondary btn-xs" onclick="window.open('index.html', '_blank')">OPEN MISSION CONTROL</button>
            </div>
            
            <div class="manual-input-bar">
                <input type="text" id="target-url" class="url-input" placeholder="Paste Douyin / TikTok URL here...">
                <button class="btn btn-primary btn-xs" onclick="manualAddTarget()"><i data-lucide="plus"></i> ADD TARGET</button>
            </div>

            <div style="flex:1; overflow-y:auto;">
                <table class="artifact-table">
                    <thead>
                        <tr>
                            <th>TARGET ID</th>
                            <th>METADATA / TITLE</th>
                            <th>AUTHOR</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="artifact-list"></tbody>
                </table>
            </div>
        </div>

        <div class="terminal-box">
            <div id="terminal-logs"></div>
            <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
                <button class="btn-glow" onclick="launchUltimateMission()">
                    <i data-lucide="zap"></i> LAUNCH AUTO-SCAN
                </button>
                <button class="btn btn-secondary" onclick="clearLogs()">CLEAR LOGS</button>
            </div>
        </div>
    </div>

    <!-- VIDEO PREVIEW MODAL -->
    <div id="video-modal" class="video-modal" onclick="closePreview(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-close" onclick="closePreview()"><i data-lucide="x"></i></div>
            <video id="preview-player" controls autoplay>
                <source src="" type="video/source">
                Your browser does not support the video tag.
            </video>
            <div style="padding: 15px; background: #141417; border-top: 1px solid var(--border);">
                <div id="preview-title" style="font-weight: 700; font-size: 14px; color: #fff;">Video Preview</div>
                <div id="preview-meta" style="font-size: 11px; color: var(--text-dim); margin-top: 5px;">AIOS Artifact Cluster #01</div>
            </div>
        </div>
    </div>

    <script>
        let stats = { hunted: 0, space: 0, repo: 0 };

        function log(msg, isError=false) {
            const win = document.getElementById('terminal-logs');
            const div = document.createElement('div');
            div.style.color = isError ? '#ff4757' : '#4ec9b0';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function launchUltimateMission() {
            document.getElementById('engine-status').innerHTML = '<span class="status-tag running">SCANNING TOP 10...</span>';
            log("> Initializing Global Viral Scan for TOP 10 Most Viewed...");
            await new Promise(r => setTimeout(r, 1500));
            
            const count = 10;
            for(let i=0; i < count; i++) {
                const views = (Math.random() * 9 + 1).toFixed(1) + "M"; // Random 1M - 10M views
                const id = `dy_${Math.floor(Math.random()*900000 + 100000)}`;
                const title = `Top Viral Content #${i+1} [${views} Views]`;
                
                log(`> Engaging Target ${id} with ${views} views...`);
                await new Promise(r => setTimeout(r, 800));
                
                addArtifactRow(id, title, `Top_Creator_${i+1}`, "https://www.w3schools.com/html/mov_bbb.mp4");
                stats.hunted++; stats.repo++; stats.space += 1.2; updateUI();
            }
            document.getElementById('engine-status').textContent = 'IDLE';
            log("> Top 10 mission complete. All high-traffic artifacts localized.");
        }

        function manualAddTarget() {
            const urlInput = document.getElementById('target-url');
            const url = urlInput.value.trim();
            if(!url) return;
            log(`> Manually adding target: ${url.substring(0,30)}...`);
            urlInput.value = '';
            const id = `dy_${Math.floor(Math.random()*900000 + 100000)}`;
            addArtifactRow(id, "Commander Custom Target", "Admin", "https://www.w3schools.com/html/mov_bbb.mp4");
            stats.hunted++; stats.repo++; updateUI();
        }

        function addArtifactRow(id, title, author, videoUrl) {
            const list = document.getElementById('artifact-list');
            const row = document.createElement('tr');
            row.id = `row-${id}`;
            row.innerHTML = `
                <td style="font-family:'Fira Code'; color:var(--accent);">#${id}</td>
                <td style="font-weight:600;">${title}</td>
                <td style="color:var(--text-dim);">${author}</td>
                <td>
                    <div class="action-btns">
                        <div class="btn-icon play" title="Preview" onclick="openPreview('${id}', '${title}', '${videoUrl}')"><i data-lucide="play" style="width:14px;"></i></div>
                        <div class="btn-icon" title="Download" onclick="downloadArtifact('${id}')"><i data-lucide="download" style="width:14px;"></i></div>
                        <div class="btn-icon delete" title="Delete" onclick="deleteArtifact('${id}')"><i data-lucide="trash-2" style="width:14px;"></i></div>
                    </div>
                </td>
            `;
            list.prepend(row);
            lucide.createIcons();
        }

        function openPreview(id, title, url) {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('preview-player');
            const titleEl = document.getElementById('preview-title');
            
            player.src = url;
            titleEl.textContent = title;
            modal.style.display = 'flex';
            log(`> Opening preview for Artifact #${id}.`);
        }

        function closePreview() {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('preview-player');
            player.pause();
            player.src = "";
            modal.style.display = 'none';
        }

        function deleteArtifact(id) {
            if(!confirm(`Authorize deletion of #${id}?`)) return;
            const row = document.getElementById(`row-${id}`);
            if(row) row.remove();
            stats.repo--; updateUI();
            log(`> Artifact #${id} purged.`, true);
        }

        function downloadArtifact(id) {
            log(`> Downloading Artifact #${id}.mp4...`);
        }

        function updateUI() {
            document.getElementById('val-hunted').textContent = stats.hunted;
            document.getElementById('val-space').textContent = stats.space.toFixed(1) + ' MB';
            document.getElementById('val-repo').textContent = stats.repo;
        }

        function clearLogs() { document.getElementById('terminal-logs').innerHTML = ''; }
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
