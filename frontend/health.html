<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOS | System Health</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; background: var(--bg-dark); height: auto; overflow-y: auto; }
        
        .health-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .os-health-toggle {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            user-select: none;
        }

        .os-health-toggle:hover {
            border-color: var(--accent);
            background: rgba(78, 201, 176, 0.05);
        }

        .toggle-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .toggle-icon {
            transition: transform 0.3s ease;
            color: var(--accent);
        }

        .os-health-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, margin-top 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }

        .os-health-content.expanded {
            max-height: 2000px;
            opacity: 1;
            margin-top: 20px;
        }

        .os-health-toggle.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(78, 201, 176, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(78, 201, 176, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(78, 201, 176, 0); }
        }
    </style>
</head>
<body class="dark-theme">
    <div class="health-container">
        <!-- Tower Header Style -->
        <header class="tower-header" style="margin-bottom: 20px; border-radius: 12px; background: var(--bg-panel); height: 60px; padding: 0 20px;">
            <div class="header-breadcrumb" style="font-size: 14px; letter-spacing: 1px;">SYSTEM MONITOR</div>
            <div class="status-badge live"><span class="pulse-dot"></span> KERNEL STABLE</div>
        </header>

        <!-- OS Health Toggle Section -->
        <div class="os-health-toggle" id="healthToggle">
            <div class="toggle-title">
                <i data-lucide="activity" class="metric-icon"></i>
                OS HEALTH & RESOURCE MONITOR
            </div>
            <i data-lucide="chevron-down" class="toggle-icon"></i>
        </div>

        <!-- Expanded Content -->
        <div class="os-health-content" id="healthContent">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-header">
                        <span class="metric-label">CPU LOAD</span>
                        <i data-lucide="cpu" class="metric-icon"></i>
                    </div>
                    <div class="metric-value" id="val-cpu">0%</div>
                    <div class="metric-gauge"><div class="gauge-fill" id="fill-cpu" style="width: 0%"></div></div>
                    <div class="metric-sub">Real-time processing unit load</div>
                </div>

                <div class="metric-card">
                    <div class="metric-header">
                        <span class="metric-label">RAM USAGE</span>
                        <i data-lucide="database" class="metric-icon"></i>
                    </div>
                    <div class="metric-value" id="val-ram">0GB</div>
                    <div class="metric-gauge"><div class="gauge-fill" id="fill-ram" style="width: 0%"></div></div>
                    <div class="metric-sub">System memory utilization</div>
                </div>

                <div class="metric-card">
                    <div class="metric-header">
                        <span class="metric-label">TOKEN USAGE</span>
                        <i data-lucide="zap" class="metric-icon"></i>
                    </div>
                    <div class="metric-value" id="val-tokens">0</div>
                    <div class="metric-sub">Total consumption across LLMs</div>
                </div>

                <div class="metric-card">
                    <div class="metric-header">
                        <span class="metric-label">ACTIVE NODES</span>
                        <i data-lucide="layers" class="metric-icon"></i>
                    </div>
                    <div class="metric-value" id="val-procs">0</div>
                    <div class="metric-sub">Running AIOS instances</div>
                </div>
            </div>

            <div class="process-panel" style="margin-top: 20px;">
                <div class="panel-header">
                    <div class="metric-label">KERNEL PROCESS STREAM</div>
                    <div class="status-badge" style="font-size: 8px;">LIVE FEED</div>
                </div>
                <div class="process-table-wrapper">
                    <table class="process-table">
                        <thead>
                            <tr>
                                <th>PID</th>
                                <th>PROCESS</th>
                                <th>CPU</th>
                                <th>MEM</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="os-process-list">
                            <!-- Processes will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            const toggle = document.getElementById('healthToggle');
            const content = document.getElementById('healthContent');
            
            toggle.addEventListener('click', () => {
                const isExpanded = content.classList.toggle('expanded');
                toggle.classList.toggle('expanded');
                
                if (isExpanded) {
                    // Start polling only when expanded to save resources
                    startMonitoring();
                } else {
                    stopMonitoring();
                }
            });

            let monitorIntervals = [];

            function startMonitoring() {
                // Initial load
                pollSystemResources();
                loadProcesses();
                
                // Set intervals
                monitorIntervals.push(setInterval(pollSystemResources, 2000));
                monitorIntervals.push(setInterval(loadProcesses, 3000));
            }

            function stopMonitoring() {
                monitorIntervals.forEach(clearInterval);
                monitorIntervals = [];
            }
        });

        // Mock/Proxy functions for demo if script.js is missing them
        if (typeof pollSystemResources !== 'function') {
            window.pollSystemResources = () => {
                const cpu = Math.floor(Math.random() * 30) + 10;
                const ram = (Math.random() * 4 + 2).toFixed(1);
                document.getElementById('val-cpu').innerText = cpu + '%';
                document.getElementById('fill-cpu').style.width = cpu + '%';
                document.getElementById('val-ram').innerText = ram + 'GB';
                document.getElementById('fill-ram').style.width = (ram / 16 * 100) + '%';
            };
        }
    </script>
</body>
</html>
