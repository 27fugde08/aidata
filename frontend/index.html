<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOS | AI Operating System Control Tower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050507] text-[#e1e1e6] font-inter overflow-hidden h-screen flex">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-[#0a0a0f]/90 backdrop-blur-xl border-r border-white/5 flex flex-col z-50 transition-all duration-300">
        <div class="p-8 flex items-center gap-3">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                <i data-lucide="cpu" class="w-5 h-5 text-black"></i>
            </div>
            <span class="font-black tracking-tighter text-xl bg-gradient-to-r from-white to-slate-500 bg-clip-text text-transparent">AIOS</span>
        </div>
        
        <nav class="flex-1 px-4 space-y-1 mt-2">
            <div onclick="switchView('dashboard')" id="nav-dashboard" class="nav-item group active flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all duration-200">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="text-sm font-semibold">Dashboard</span>
            </div>
            <div onclick="switchView('agents')" id="nav-agents" class="nav-item group flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 cursor-pointer transition-all duration-200">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-sm font-semibold">Agent Fleet</span>
            </div>
            <div class="pt-4 pb-2 px-3">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Automation</span>
            </div>
            <div onclick="switchView('video')" id="nav-video" class="nav-item group flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 cursor-pointer transition-all duration-200">
                <i data-lucide="film" class="w-5 h-5"></i>
                <span class="text-sm font-semibold">Video Lab</span>
            </div>
            <div onclick="switchView('douyin')" id="nav-douyin" class="nav-item group flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 cursor-pointer transition-all duration-200">
                <i data-lucide="zap" class="w-5 h-5"></i>
                <span class="text-sm font-semibold">Douyin Hunter</span>
            </div>
            <div class="pt-4 pb-2 px-3">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">System</span>
            </div>
            <div onclick="switchView('health')" id="nav-health" class="nav-item group flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 cursor-pointer transition-all duration-200">
                <i data-lucide="activity" class="w-5 h-5"></i>
                <span class="text-sm font-semibold">OS Health</span>
            </div>
            <a href="http://localhost:8000/docs" target="_blank" class="nav-item group flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 cursor-pointer transition-all duration-200">
                <i data-lucide="book-open" class="w-5 h-5"></i>
                <span class="text-sm font-semibold">API Docs</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/5">
            <div class="flex items-center gap-3 p-3 bg-emerald-500/5 rounded-xl border border-emerald-500/10">
                <div class="relative">
                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <div class="absolute inset-0 w-2 h-2 rounded-full bg-emerald-500 animate-ping"></div>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-emerald-400 uppercase">Kernel Online</span>
                    <span class="text-[9px] text-slate-500 fira">v2.2.0 Stable</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <!-- Top Bar -->
        <header class="h-16 bg-[#050507]/50 backdrop-blur-md flex items-center justify-between px-8 border-b border-white/5 z-40">
            <div class="flex items-center gap-4">
                <h1 id="view-title" class="text-lg font-bold tracking-tight">Control Tower</h1>
                <div class="h-4 w-[1px] bg-white/10"></div>
                <div class="flex items-center gap-2 px-3 py-1 bg-white/5 rounded-full border border-white/10">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">Workspace:</span>
                    <span id="workspace-path" class="text-[10px] text-emerald-400 fira truncate max-w-[200px]">/storage</span>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-4 px-4 py-1.5 bg-black/40 rounded-xl border border-white/5">
                    <div class="flex flex-col items-end">
                        <span class="text-[9px] text-slate-500 font-bold uppercase">CPU Load</span>
                        <span id="header-cpu" class="text-xs font-bold fira text-emerald-400">0%</span>
                    </div>
                    <div class="w-[1px] h-6 bg-white/5"></div>
                    <div class="flex flex-col items-end">
                        <span class="text-[9px] text-slate-500 font-bold uppercase">Memory</span>
                        <span id="header-ram" class="text-xs font-bold fira text-blue-400">0GB</span>
                    </div>
                </div>
                <button class="p-2.5 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                    <i data-lucide="bell" class="w-4 h-4"></i>
                </button>
                <button class="p-2.5 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- View Container -->
        <div id="view-content" class="flex-1 overflow-hidden p-6">
            <!-- Content will be injected here via JavaScript -->
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3"></div>

    </main>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
